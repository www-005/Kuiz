text: `HYRJE NË MULTIMEDIA<br></br>

Çka është multimedia?
Multimedia është kombinim i disa mediumeve për komunikim më të pasur dhe më efektiv.<br></br>

Definimi i multimediasv<br></br>

• Multimedia është bashkimi i dy ose më shumë formave të medias (tekst,
imazh/grafikë, audio, video, animacion) në një përmbajtje të vetme.<br></br>

Kuptimi i teknologjive multimediale<br></br>

•Përdor tekste, audio, video, grafika, animacione
•Krijim / manipulim / prezantim i përmbajtjes
•Kombinon pajisje + softuer + platforma
•Shpesh ruhet dhe transmetohet në formate digjitale (skedarë / kodekë / kontejnerë)<br></br>

Rëndësia e multimedias<br></br>

1. Komunikim më efektiv
2.Mësim më i pasur
3. Angazhim & interaktivitet
4.Përdorim në industri të ndryshme
5. Mbajtje më e mirë e informacionit
6.Argëtim & kreativitet
7. Komunikim në biznes
8.Akses global
9.Marketing & reklamim
10.Inovacion & zhvillim teknologjik<br></br>

1. Komunikim më efektiv<br></br>

• Kombinimi i tekstit, imazheve, audios dhe videos e bën mesazhin më të qartë dhe
më të kuptueshëm.
• Marrësi e përpunon informacionin në më shumë se një kanal.<br></br>

2. Mësim i përmirësuar<br></br>

• Përmbajtja vizuale/interactive e bën më të lehtë kuptimin e koncepteve.
• Mbështet stile të ndryshme të të nxënit.<br></br>

3. Angazhimi dhe interaktiviteti<br></br>

përdoruesve të angazhohen me materialin.
• Ky interaktivitet rrit përfshirjen e përdoruesit dhe mund të çojë në një përvojë më

disa shqisave.

6. Argëtim dhe kreativitet<br></br>

text: `TEKSTI NË MULTIMEDIA<br></br>
Çka është teksti?

• Teksti është një komponentë e rëndësishme që përdoret në shumë aplikacione
multimediale.
• Teksti është i përbërë prej karaktereve të ndryshme të cilat përdoren për të krijuar
fjalë, fjali dhe paragrafe.
• Teksti, si i vetëm prodhon burim të informacionit dhe është një element shumë i
rëndësishëm që prodhon informacione bazike.<br></br>

Rëndësia e tekstit<br></br>

• Teksti luan një rol kritik në multimedia duke transmetuar informacion, duke ofruar
kontekst dhe duke udhëzuar audiencën nëpër përmbajtje.<br></br>

• Tre format kryesore se si teksti tregon rëndësinë e tij në multimedia janë:
1. Information Conveyance
2. Storytelling
3. User Engagement<br></br>

1. Information Conveyance<br></br>

• Teksti në multimedia shërben si një mjet i fuqishëm për transmetimin e
informacionit. Ai vepron si një medium përmes të cilit mesazhet e rëndësishme,
shpjegimet dhe përmbajtja e detajuar komunikohen në audiencë.
• Pavarësisht nëse ofron fakte kyçe, përshkruan koncepte, ose paraqet të dhëna,
teksti luan një rol themelor në transmetimin efektiv të informacionit.<br></br>

2. Storytelling<br></br>

• Teksti kontribuon ndjeshëm në aspektin narrativ ose tregimor të përmbajtjes
multimediale.
• Pavarësisht se si shfaqet teksti në ekran, në formë të dublimeve, ose titrave,
struktura narrative e krijuar nga teksti përmirëson përvojën e përgjithshme të
tregimit për audiencën.<br></br>

3. User Engagement<br></br>

• Teksti i përpiluar mirë ka aftësinë për të kapur dhe mbajtur vëmendjen e audiencës,
duke çuar në rritjen e angazhimit të përgjithshëm. Ky angazhim arrin përmes
përdorimit të artit me gjuhën, tonin dhe stilin.
• Teksti që korrespondon me interesat dhe emocionet e audiencës përmirëson
përvojën e përgjithshme të përdoruesit dhe inkurajon angazhimin e vazhdueshëm.<br></br>

Karakteristikat e tekstit<br></br>

1. Fonti<br></br>
2. Typeface<br></br>
3. Madhësia<br></br>
4. Stili<br></br>
5. Ngjyra e fontit<br></br>
6. Ngjyra e prapavisë<br></br>

Fonti<br></br>

• Paraqet dizajn për një numër të caktuar të karaktereve.
• Paraqet një koleksion të karaktereve të cilat kanë një madhësi të caktuar dhe një
stil të caktuar dhe janë pjesë e një ‘typeface’ të caktuar.<br></br>

Kategorizimi i fontit<br></br>

• Fonti mund të kategorizohet në dy forma të ndryshme:
1. Serif
2. Sans-serif
3. Monospace
4. Display/Decorative<br></br>

Fontet Serif<br></br>

• Fontet serif përdoren shpesh në materiale të shtypura si libra,
gazeta dhe revista.
• Ata konsiderohen më të lexueshëm në përmbajtje të gjata të tekstit
për shkak të efektit udhëzues të serifeve.
• Fontet serif mund të jenë më pak të përshtatshme për ndërfaqe
digjitale ose tekst të madh, ku thjeshtësia dhe qartësia janë në plan
të parë.<br></br>

Fontet Sans-Serif<br></br>

• Fontet sans-serif shpesh lidhen me një pamje më bashkëkohore
dhe joformale.
• Fontet sans-serif përdoren shpesh në ndërfaqe digjitale, faqe
interneti dhe prezantime.
• Fontet sans-serif mund të perceptohen si më të lexueshme në
ekrane, sidomos në madhësi të vogla.
• Ata janë të përshtatshëm dhe mund të përdoren në kontekste
të ndryshme të dizajnit, duke ofruar një estetikë të pastër dhe
minimaliste.<br></br>

Fontet Monospace<br></br>

• Te fontet monospace, çdo shkronjë zë të
njëjtën hapësirë horizontale (p.sh. “i” dhe
“W” kanë të njëjtën gjerësi).
• Përdoren kryesisht për kod programimi,
terminal/console, tabela teknike, dhe kur
duhet rreshtim i saktë i karaktereve
• Avantazh: lexueshmëri dhe rreshtim i
qëndrueshëm në tekst Teknik
• Shembuj: Courier New, Consolas,
Monaco, Source Code Pro.<br></br>

Fontet Dekorative<br></br>

• Fontet dekorative kanë stil të veçantë
artistik dhe përdoren për të krijuar
ndjesi/atmosferë (modern, retro, elegant,
festiv, etj.).
• Janë të përshtatshme për: tituj, logo,
posterë, reklama, kopertina, jo për
paragrafë të gjatë.
• Shpesh kanë lexueshmëri më të ulët,
prandaj përdoren me masë dhe në
madhësi më të mëdha.<br></br>

Typeface<br></br>
• Një typeface paraqet një familje të karakterave grafik që
zakonisht në vete përfshinë madhësi dhe stile të ndryshme.
• Një typeface në vete përfshin disa fonte caktuar.<br></br>

Tipografia<br></br>

• Typographia është arti dhe teknika e
organizimit të shkrimit për të bërë gjuhën
e shkruar të lexueshme, të kuptueshme
dhe tërheqëse vizualisht.
• Përfshin zgjedhjen e fonteve, madhësinë
e tyre, distancën midis rreshtave dhe
elementet e tjera për të krijuar një
prezantim efektiv dhe estetik të
përmbajtjes së shkruar.<br></br>

Selektimi i fontit<br></br>

• Zgjedhja e fontit referohet në procesin e zgjedhjes së një faqeje të veçantë ose
familjeje të fonteve për shfaqjen e përmbajtjes së shkruar.<br></br>
• Në kontekstin e dizajnit, brandimit ose komunikimit, zgjedhja e një fonti të
përshtatshëm është një vendim kyç që ndikon në perceptimin e tekstit nga
audienca.<br></br>
• Zgjedhja e fontit përfshin shqyrtimin e faktorëve të ndryshëm për të siguruar që
faqja e zgjedhur të përputhet me qëllimet e përgjithshme të dizajnit dhe të
komunikojë efektivisht mesazhin e dëshiruar.<br></br>

Rëndësia e tipografisë dhe selektimit të
fontit<br></br>

• Roli i tipografisë dhe zgjedhja e fontit është thelbësor në dizajn dhe komunikim,
duke influencuar mënyrën se si informacioni prezantohet dhe perceptohet.<br></br>
• Çështjet të cilat duhet të merren parasysh janë:<br></br>
1. Estetika vizuele<br></br>
2. Theksi dhe hierarhia<br></br>
3. Konsistenca<br></br>
4. Lexueshmëria dhe kuptueshmëria<br></br>
5. Brandimi dhe identiteti<br></br>

1. Estetika Vizuele<br></br>

• Tipografia: Arti dhe teknika e organizimit të shkrimit përfshijnë zgjedhjen e fonteve,
madhësive të tyre, hapësirës midis rreshtave dhe hapësirës midis shkronjave për të
krijuar tekst tërheqës dhe harmonik. Dizajni tipografik i përgjithshëm kontribuon në
apelin estetik të një dokumenti apo dizajni.<br></br>
• Zgjedhja e Fontit: Fonte të ndryshme sjellin karakteristika vizuale të ndryshme.
Estetika vizuale e fonteve të zgjedhura luan një rol të rëndësishëm në formimin e
identitetit të përgjithshëm të dizajnit.<br></br>

2. Theksi dhe Hierarhia<br></br>

• Tipografia: Zgjedhja dhe stilizimi i fontit janë të rëndësishme për të krijuar theks
dhe hierarki brenda një teksti. Tekste të trasha, italic, ose madhësi të ndryshme të
fontit mund të përdoren për të theksuar informacionin e rëndësishëm, krijuar tituj,
dhe strukturuar përmbajtjen.<br></br>
• Zgjedhja e Fontit: Fontet serif dhe sans-serif kanë peshë vizuale të ndryshme.
Zgjedhja e fonteve me pesha vizuale komplementare ndihmon në vendosjen e një
hierarkie të qartë në dizajn.<br></br>

3. Konsistenca<br></br>

• Tipografia: Konsistenca në përdorimin e fontit nëpër një dokument ose dizajn
përmirëson koherencën vizuale. Zgjedhjet e konsistenta në llojin e fontit,
madhësinë, dhe stilizimin kontribuojnë në një dukje të përpiktë dhe profesionale.<br></br>
• Zgjedhja e Fontit: Zgjedhja e fonteve që përputhen me temën e përgjithshme ose
identitetin e markës siguron një dizajn të përbashkët dhe të unifikuar. Konsistenca
në zgjedhjen e fontit forcon identitetin vizual dhe rikonfirmon mesazhin e synuar.<br></br>

4. Lexueshmëria dhe kuptueshmëria<br></br>

• Tipografia: Zgjedhjet tipografike të përshtatshme kontribuojnë në lexueshmëri—se
sa lehtë mund të lexohet teksti—dhe kuptueshmëri—se sa të qarta janë karakteret
individuale. Faktorë si madhësia e fontit, hapësira midis rreshtave dhe dizajni i
karaktereve ndikojnë në lehtësinë me të cilën lexuesit mund të konsumojnë
përmbajtjen.<br></br>
• Zgjedhja e Fontit: Fontet serif dhe sans-serif kanë karakteristika të ndryshme në
lexueshmëri. Fontet sans-serif shpesh konsiderohen më të lexueshme në ekrane
digjitale, ndërsa fontet serif mund të shkëlqejnë në materiale të printuara dhe
tekste më të gjata.<br></br>

5. Brandimi dhe identiteti<br></br>

• Tipografia: Fontet luajnë një rol të rëndësishëm në transmetimin e personalitetit
dhe identitetit të një marke apo projekti. Tipografia e zgjedhur bëhet një pjesë e
përmbajtjes vizuale të lidhur me një entitet të caktuar.<br></br>
• Zgjedhja e Fontit: Zgjedhja e fonteve specifike mund të shkaktojë emocione, të
paraqesë etikën e një brendi, ose të përputhet me një audiencë të caktuar.
Përdorimi konsistent i fonteve nëpër materiale brandimi rikonfirmon identitetin
dhe ndihmon në njohjen e markës.<br></br>

Teksti si element i dizajnit<br></br>

• Teksti shërben si një element themelor i dizajnit që shkon përtej transmetimit të
informacionit – ai kontribuon në estetikën e përgjithshme, komunikon tonin dhe
drejton vëmendjen e shikuesit.<br></br>
• Aspektet kyçe të tekstit si element i dizajnit:<br></br>

Përdorimi i tekstit në dizajnin grafik<br></br>

• Në dizajnin grafik, teksti është më shumë se sa thjesht informacion – ai bëhet një
element vizual që ndikon në mënyrë aktive me komponentët e tjerë të dizajnit.<br></br>

Përdorimi i tekstit në projektet
multimediale<br></br>

• Përdorimi efektiv i tekstit në projekte multimediale përfshin një përqasje të
menduar midis principeve të dizajnit dhe qëllimeve të komunikimit.<br></br>

1. Grafika lëvizëse
2. Dizajni interaktiv
3. Dizajni i logove
4. Dizajni i faqeve të internetit
5. Materiale të printuara
6. Grafikat në media sociale<br></br>

Rregulla praktike për tekst në ekran
(UI/Prezantime/Web)<br></br>
• Përdor maksimum 2 fonte në një project
• Madhësia: tituj 32–44pt, tekst 24–32pt (në prezantime)
• 45–75 karaktere për rresht (lexueshmëri më e mirë)
• Line spacing: 1.2–1.5
• Kontrast i lartë tekst–sfond (shmang gri mbi gri)<br></br>

Teksti në multimedia: titra, caption, UI labels<br></br>

• Titra (subtitles): dialog + përkthim
• Captions: dialog + tinguj (“[trokitje]”, “[muzikë]”)
• UI text: butona, menu, mesazhe gabimi (microcopy)
• Qëllimi: udhëzim i qartë + aksesueshmëri<br></br>

Struktura e tekstit<br></br>

• Në multimedia teksti mund të jetë i strukturuar në dy mënyra të ndyshme:
1. Lineare
2. Jo-lineare<br></br>

Teksti Linear<br></br>

• Struktura lineare e tekstit ndjek një rend sipas radhës, ku informacioni paraqitet në
një vijë të drejtë ose një sekuenca të fiksuar.
• Lexuesit konsumojnë përmbajtjen nga fillimi deri në fund, duke ndjekur një rrugë të
paracaktuar të vendosur nga autori.<br></br>

Veçoritë e tektit linear<br></br>

1.Renditje Kronologjike
2.Shkaqe dhe Pasojat
3.Fillim, Mes, Mbarim
4.Romane dhe Ese Tradicionale<br></br>

Tekstri Jo-Linear<br></br>

• Struktura jo-lineare e tekstit devijon nga një rend sekuencale, duke lejuar lexuesit
të shfletojnë përmbajtjen në një mënyrë më fleksibël.
• Informacioni nuk prezantohet në një progres të fiksuar, dhe lexuesit mund të
zgjedhin rrugë të ndryshme përmes materies.<br></br>

Veçoritë e tekstit jo-linear<br></br>

1.Hyperlinks dhe Navigimi
2.Narrativa me Degëzim
3.Prezantime Multimediale
4.Module Mësimore Interaktive<br></br>

Koncepte të rëndësishme të tekstit jo- linear<br></br>

1. Hiperteksti
2. Hiperlinku
3. Hipermedia<br></br>

1. Hiperteksti<br></br>

Hiperteksti është një sistem shkrimi ose paraqitjeje e tekstit që përmban lidhje, të
quajtura hiperlinkut, për tekste të tjera.
Ai lejon përdoruesit të zgjedhin rrugën e tyre duke zgjedhur cilat lidhje të ndjekin,
duke krijuar një përvojë leximi jo-lineare.
Në vend që të ketë një strukturë lineare tradicionale, hiperteksti është i organizuar në
një rrjet ose strukturë të ngjashme me rrjetin.
Çdo pjese e tekstit është e lidhur me të tjera përmes hipervincave.<br></br>

2. Hiperlinku<br></br>

• Hiperlinku është një element i klikueshëm në një dokument dixhital që, kur
aktivizohet, çon përdoruesin në një tjetër vend brenda të njëjtit dokument ose në
një dokument ose burim tjetër.<br></br>
• Hiperlinqet janë elementet e navigimit që e mundësojnë leximin jo-linear.<br></br>

Llojet e hiperlinkut<br></br>

• Intern – Lidhin me seksione ose faqe të tjera brenda të njëjtit dokument.<br></br>
• Ekstern – Lidhin me përmbajtje në dokumente të ndryshme ose faqe të internetit.<br></br>

3. Hipermedia<br></br>

Hipermedia zgjeron konceptin e hipertekstit për të përfshirë media të ndryshme
përtej tekstit, si imazhe, audio, video, dhe më shumë.
Ajo ofron një përvojë të pasur dhe interaktivet ku përdoruesit mund të lundrojnë jo
vetëm nëpër tekst, por edhe nëpër lloje të ndryshme të mediave.
Hipermedia mund të përfshijë video të integruara, klipet audio, imazhet interaktive
dhe elementet e tjera multimediale që përmirësojnë përmbajtjen në përgjithësi.<br></br>

Procesi i leximit jo-linear<br></br>

1. Qasja në dokument
2. Leximi dhe navigimi
3. Klikimi i hiperlinkut
4. Eksplorimi i rrugëve jo-lineare
5. Kthimi dhe rishikimi<br></br>

Cognitive Load<br></br>

• Ngarkesa kognitive në multimedia përfshin përpjekjen mendore të nevojshme për
të përpunuar informacionin gjatë mësimit apo përfundimit të një detyre. Kjo
përfshin menaxhimin e kompleksitetit themelor të përmbajtjes (ngarkesa
intrinsike), zvogëlimin e informacionit irelevant (ngarkesa e tepërt), dhe nxitjen e
integritetit të njohurive të reja (ngarkesa gjermane).<br></br>
• Dizajni efektiv i multimedis synon të optimizojë mësimin duke paraqitur
informacionin në një mënyrë që zvogëlon barrën mendore të panevojshme dhe
përmirëson kuptimin.<br></br>

Teksti dhe cognitive load<br></br>

• Teksti ndikon në ngarkesën kognitive dhe përpunimin e informacionit në
multimedia duke ndikuar në ate se si informacioni paraqitet dhe absorbohet.<br></br>
• Teksti në multimedia mund të lehtësojë ose të pengojë ngarkesën kognitive dhe
përpunimin e informacionit, në varësi të faktorëve si qartësia, lexueshmëria,
organizimi, relevanca dhe integrimi i tij me elementët e tjera multimediale.<br></br>

Si teksti ndikon në cognitive load?<br></br>

1.Klarifikimi i Shprehjes: Teksti i qartë dhe i shkurtër zvogëlon ngarkesën kognitive
duke paraqitur informacionin në një mënyrë lehtësisht kuptueshme.
2.Lexueshmëria: Zgjedhja e fontit, madhësia dhe formatimi ndikojnë në lexueshmëri.
3.Organizimi dhe Struktura: Mënyra se si është i organizuar dhe strukturohet teksti
ndikon në përpunimin e informacionit.
4.Relevanca: Përfshirja vetëm e informacionit të rëndësishëm në tekst zvogëlon
ngarkesën kognitive të tepërt.
5.Paraqitja Multimodale: Kombinimi i tekstit me elemente të tjera multimedia, si
imazhe apo video, mund të përmirësojë kuptimin.<br></br>

Strategji për minimizim të cognitive load<br></br>

1. Simplify Language and Sentence Structure
2. Choose Readable Fonts
3. Use Concise and Relevant Text
4. Utilize Visual Aids
5. Organize Information Logically
6. Provide Adequate White Space
7. Use Bullet Points and Lists
8. Limit Text on Slides
9. Progressive Disclosure
10. Provide Interactive Elements
11. Offer Multimedia Options<br></br>

let state={subject:null,lecture:null,index:0,score:0};

function renderDashboard(){
let html='<div class="grid">';
for(let s in data){html+=`<button class="btn" onclick="openSubject('${s}')">${s}</button>`}
html+='</div>';
document.getElementById('app').innerHTML=html;
}

function openSubject(s){state.subject=s;
let html='<div class="nav"><button onclick="renderDashboard()">⬅</button></div><div class="grid">';
for(let l in data[s]){html+=`<button class="btn" onclick="openLecture('${l}')">${l}</button>`}
html+='</div>';
document.getElementById('app').innerHTML=html;}

function openLecture(l){state.lecture=l;
let lec=data[state.subject][l];
let html=`<div class="nav"><button onclick="openSubject('${state.subject}')">⬅</button></div>
<div class="card"><h3>${l}</h3><p>${lec.text}</p>
<button class="btn" onclick="startQuiz()">Fillo Kuizin</button></div>`;
document.getElementById('app').innerHTML=html;}

function startQuiz(){state.index=0;state.score=0;showQ();}

function showQ(){let quiz=data[state.subject][state.lecture].quiz;
let q=quiz[state.index];
let html=`<div class="card"><h3>Pyetja ${state.index+1}</h3><p>${q.q}</p>
<input id="ans" placeholder="Shkruaj pergjigjen">
<br><br><button class="btn" onclick="nextQ()">Tjetra</button></div>`;
document.getElementById('app').innerHTML=html;}

function nextQ(){let quiz=data[state.subject][state.lecture].quiz;
let user=document.getElementById('ans').value.toLowerCase();
let correct=quiz[state.index].a.toLowerCase();
if(user.includes(correct.substring(0,10))) state.score++;
state.index++;
if(state.index<quiz.length){showQ()} else {endQuiz()}}

function endQuiz(){let html=`<div class="card"><h2>Rezultati: ${state.score}/${data[state.subject][state.lecture].quiz.length}</h2>
<button class="btn" onclick="openLecture('${state.lecture}')">Kthehu</button></div>`;
document.getElementById('app').innerHTML=html;}

renderDashboard();
</script>
